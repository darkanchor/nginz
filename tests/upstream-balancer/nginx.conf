daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    # Cookie sticky, one backend, fallback next (default)
    upstream backend_cookie {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_fallback next;

        server 127.0.0.1:19002;
    }

    # Header sticky, one backend, fallback next (default)
    upstream backend_header {
        upstream_balancer_sticky_header X-Sticky-Key;
        upstream_balancer_fallback next;

        server 127.0.0.1:19002;
    }

    # Cookie sticky, two backends — for determinism testing
    upstream backend_two {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_fallback next;

        server 127.0.0.1:19002;
        server 127.0.0.1:19003;
    }

    # Cookie sticky, fallback off
    upstream backend_fallback_off {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_fallback off;

        server 127.0.0.1:19002;
    }

    # Plain upstream — no sticky directives, stock nginx behavior
    upstream backend_plain {
        server 127.0.0.1:19002;
    }

    server {
        listen 8888;

        location /cookie {
            proxy_pass http://backend_cookie;
        }

        location /header {
            proxy_pass http://backend_header;
        }

        location /sticky {
            proxy_pass http://backend_two;
        }

        location /fallback-off {
            proxy_pass http://backend_fallback_off;
        }

        location /plain {
            proxy_pass http://backend_plain;
        }
    }
}

daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream backend_dynamic_partial {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_fallback next;
        upstream_balancer_issue_cookie on;
        dynamic_upstreams_managed;

        server 127.0.0.1:19002;
        server 127.0.0.1:19003;
    }

    server {
        listen 8888;

        location /dynamic-upstreams {
            dynamic_upstreams_api;
            dynamic_upstreams_target backend_dynamic_partial;
        }

        location / {
            proxy_pass http://backend_dynamic_partial;
        }
    }
}

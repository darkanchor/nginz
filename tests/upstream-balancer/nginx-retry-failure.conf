daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream backend_retry_failure {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_fallback next;

        server 127.0.0.1:19122 max_fails=1 fail_timeout=30s;
        server 127.0.0.1:19123;
    }

    server {
        listen 8888;
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 2;
        proxy_connect_timeout 100ms;
        proxy_read_timeout 500ms;
        proxy_send_timeout 500ms;

        location / {
            proxy_pass http://backend_retry_failure;
        }
    }
}

daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    # Invalid: cookie and header sticky in same upstream block.
    # upstream_balancer_sticky_cookie and upstream_balancer_sticky_header are
    # mutually exclusive — this config must be rejected at parse time.
    upstream backend_invalid {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_sticky_header X-Sticky-Key;

        server 127.0.0.1:19002;
    }

    server {
        listen 8889;

        location / {
            proxy_pass http://backend_invalid;
        }
    }
}

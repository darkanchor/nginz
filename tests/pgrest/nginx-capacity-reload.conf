daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;
worker_processes 2;

events {
    worker_connections 128;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;
        include capacity-locations.conf;
    }
}

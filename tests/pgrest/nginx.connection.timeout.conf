daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        location /api/ {
            pgrest_pass "host=10.255.255.1 port=15432 dbname=testdb user=postgres connect_timeout=1";
            pgrest_timeout 1s;
            pgrest_schemas "public";
        }
    }
}

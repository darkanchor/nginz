worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Regular endpoints for generating traffic
        location / {
            return 200 "ok\n";
        }

        location /api {
            return 200 "api response\n";
        }

        location /error {
            return 500 "error\n";
        }

        location /notfound {
            return 404 "not found\n";
        }

        location /redirect {
            return 302 /;
        }

        # Metrics endpoint
        location /metrics {
            prometheus_metrics;
        }

        location /vars {
            add_header X-Prometheus-Requests-Total $prometheus_requests_total always;
            add_header X-Prometheus-Error-Rate $prometheus_error_rate always;
            echozn "vars ok";
        }
    }
}

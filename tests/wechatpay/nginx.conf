daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;
worker_processes 2;

events {
    worker_connections 64;
}

http {
    wechatpay_allow_insecure_http on;
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    wechatpay_apiclient_key_file fixtures/test_private.pem;
    wechatpay_public_key_file fixtures/test_public.pem;
    wechatpay_apiclient_serial APICLIENTSERIAL123;
    wechatpay_serial PLATFORMSERIAL456;
    wechatpay_mch_id 1900001111;

    server {
        listen 8888;

        location /encrypt {
            wechatpay_oaep_encrypt on;
        }

        location /decrypt {
            wechatpay_oaep_decrypt on;
        }

        location /notify {
            wechatpay_access;
            echoz_read_request_body;
            echozn "verified:";
            echoz_request_body;
        }

        location /notify-spill {
            client_body_buffer_size 1k;
            wechatpay_access;
            echoz_read_request_body;
            echozn "verified:";
            echoz_request_body;
        }

        location /notify-aes {
            wechatpay_access 0123456789abcdef0123456789abcdef;
            echoz_read_request_body;
            echozn "verified:";
            echoz_request_body;
        }

        location /notify-bounded {
            wechatpay_body_max_size 64;
            wechatpay_access;
            echoz_read_request_body;
            echozn "must-not-pass";
        }

        location /proxy {
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        location /proxy-spill {
            client_body_buffer_size 1k;
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        location /proxy-bad {
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        location /proxy-raw {
            wechatpay_proxy_pass http://127.0.0.1:19005;
        }

        location /proxy-bounded {
            wechatpay_body_max_size 64;
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        location / {
            echozn "ok";
        }
    }
}

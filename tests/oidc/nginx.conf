daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    oidc_allow_insecure_http on;
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # OIDC protected endpoint - redirects to authorization
        location /protected {
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;

            echozn '{"status":"protected_content"}';
        }

        location /_protected {
            internal;
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;

            echozn '{"status":"protected_content"}';
        }

        # OIDC protected endpoint that exposes claim variables
        location /claims {
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;

            # Expose claims via response headers
            add_header X-OIDC-Sub $oidc_claim_sub;
            add_header X-OIDC-Email $oidc_claim_email;
            add_header X-OIDC-Name $oidc_claim_name;

            echozn '{"status":"claims_content","sub":"$oidc_claim_sub","email":"$oidc_claim_email","name":"$oidc_claim_name"}';
        }

        # Protected endpoint with quoted original URI path to stress state cookie JSON encoding
        location /protected-quote"path {
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;

            echozn '{"status":"quoted_path_content"}';
        }

        # Callback endpoint
        location /callback {
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;
        }

        # OIDC with PKCE disabled
        location /no-pkce {
            oidc on;
            oidc_pkce off;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;

            echozn '{"status":"no_pkce_content"}';
        }

        location /oversized-metadata {
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery-oversized.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback-oversized;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;

            echozn '{"status":"must_not_pass"}';
        }

        location /callback-oversized {
            oidc on;
            oidc_discovery /home/kaiwu/Documents/gitea/nginz/tests/oidc/discovery-oversized.json;
            oidc_client_id test-client;
            oidc_client_secret test-secret;
            oidc_redirect_uri http://localhost:8888/callback-oversized;
            oidc_cookie_secret 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef;
        }

        # OIDC disabled - passthrough
        location /public {
            oidc off;

            echozn '{"status":"public_content"}';
        }

        location /auth-gate {
            auth_request /_protected;
            echozn "oidc-granted";
        }

        location /ssi-protected {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# config errmsg='OIDC_DENIED' --><!--# include virtual='/_protected' -->";
        }

        location /mirror-protected {
            mirror /_protected;
            echozn "oidc-mirror-ok";
        }

        # Health check
        location / {
            echozn '{"status":"ok"}';
        }
    }
}

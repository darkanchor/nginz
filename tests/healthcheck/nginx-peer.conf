worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream backend {
        server 127.0.0.1:19002;
        health_upstream_peer_probe 127.0.0.1:19002 http://127.0.0.1:19002/peer-probe;
    }

    server {
        listen 8888;

        location /health {
            health_status;
            health_probe http://127.0.0.1:19001/probe;
            health_probe_interval 100ms;
            health_probe_timeout 100ms;
            health_probe_fails 1;
            health_probe_passes 1;
        }

        location /healthz {
            health_liveness;
        }

        location /ready {
            health_readiness;
        }

        location /metrics {
            health_metrics;
        }

        location / {
            proxy_pass http://backend;
        }
    }
}

worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream backend {
        server 127.0.0.1:19002;
        health_upstream_probe http://127.0.0.1:19002/upstream-probe;
        health_upstream_probe_interval 100ms;
        health_upstream_probe_timeout 100ms;
        health_upstream_probe_fails 1;
        health_upstream_probe_passes 2;
    }

    server {
        listen 8888;

        location /health {
            health_status;
            health_probe http://127.0.0.1:19001/probe;
            health_probe_interval 100ms;
            health_probe_timeout 100ms;
            health_probe_fails 1;
            health_probe_passes 2;
        }

        location /healthz {
            health_liveness;
        }

        location /ready {
            health_readiness;
        }

        location /health-vars {
            add_header X-Health-Readiness $health_readiness always;
            add_header X-Health-Liveness $health_liveness always;
            add_header X-Health-Backend-Healthy-Count $health_backend_healthy_count always;
            add_header X-Health-Backend-Total-Count $health_backend_total_count always;
            add_header X-Health-Backend-Failure-Count $health_backend_failure_count always;
            echozn "health vars";
        }

        location /proxy {
            proxy_pass http://backend;
        }

        location / {
            echozn "Hello World";
        }

        location /fail {
            return 500 "fail\n";
        }
    }
}

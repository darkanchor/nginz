worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        location /health {
            health_status;
            health_probe http://127.0.0.1:19001/probe;
            health_probe_interval 100ms;
            health_probe_timeout 100ms;
            health_probe_fails 1;
            health_probe_passes 2;
            health_worker_events_channel health;
            health_worker_events_zone health_bus;
        }

        location /ready {
            health_readiness;
        }

        location /healthz {
            health_liveness;
        }

        location /worker-events {
            worker_events_api;
            worker_events_zone health_bus;
            worker_events_channel health;
            worker_events_ring_size 64;
        }

        location / {
            echozn "Hello World";
        }
    }
}

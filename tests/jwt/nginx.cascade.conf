worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    # ── http-level defaults (cascade to all servers/locations) ────────

    jwt_secret "cascade-secret-hs256";
    jwt_validate_exp off;
    jwt_leeway 60;
    jwt_claim $jwt_sub sub;

    server {
        listen 8888;

        # Inherits http-level: secret, validate_exp=off, leeway=60
        location /inherit-all {
            add_header X-Jwt-Sub $jwt_sub always;
            echozn "OK";
        }

        # Override validate_exp at location level
        location /override-exp {
            jwt_validate_exp on;
            echozn "OK";
        }

        # Override require_claim at location level
        location /override-require {
            jwt_require_claim role eq admin;
            echozn "OK";
        }

        # Explicitly set secret (should still inherit claims from http)
        location /explicit-secret {
            jwt_secret "override-secret-hs256";
            jwt_claim $jwt_name name;
            add_header X-Jwt-Sub $jwt_sub always;
            add_header X-Jwt-Name $jwt_name always;
            echozn "OK";
        }

        # ── Public endpoint (explicitly disable JWT) ────────────────

        location /public {
            jwt_secret off;
            echozn "Public";
        }
    }
}

worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        location /phase-access {
            jwt_secret "phase-secret-hs256";
            jwt_phase access;
            echozn "ACCESS";
        }

        location /phase-preaccess {
            jwt_secret "phase-secret-hs256";
            jwt_phase preaccess;
            echozn "PREACCESS";
        }
    }
}

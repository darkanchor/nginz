worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # ── Legacy HS256 (backwards compat) ───────────────────────────

        location /protected {
            jwt_secret "my-secret-key-for-testing-hs256";
            echozn "HS256 OK";
        }

        # ── RSA256 via keyval file ────────────────────────────────────

        location /rs256 {
            jwt_key_file keys-rs256.json keyval;
            echozn "RS256 OK";
        }

        # ── RSA384 via keyval file ────────────────────────────────────

        location /rs384 {
            jwt_key_file keys-rs384.json keyval;
            echozn "RS384 OK";
        }

        # ── RSA512 via keyval file ────────────────────────────────────

        location /rs512 {
            jwt_key_file keys-rs512.json keyval;
            echozn "RS512 OK";
        }

        # ── HS384 via inline secret (backwards compat) ────────────────

        location /hs384 {
            jwt_secret "hs384-test-secret-32-bytes-long!!";
            echozn "HS384 OK";
        }

        # ── HS512 via inline secret (backwards compat) ────────────────

        location /hs512 {
            jwt_secret "hs512-test-secret-64-bytes-long!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!";
            echozn "HS512 OK";
        }

        # ── Multi-key with kid matching ───────────────────────────────

        location /kid-match {
            jwt_key_file keys-kid.json keyval;
            echozn "KID OK";
        }

        # ── Algorithm enforcement ─────────────────────────────────────

        location /alg-rs256-only {
            jwt_key_file keys-rs256.json keyval;
            echozn "RS256-only OK";
        }

        location /es256 {
            jwt_key_file keys-es256.json keyval;
            echozn "ES256 OK";
        }

        location /es384 {
            jwt_key_file keys-es384.json keyval;
            echozn "ES384 OK";
        }

        location /es512 {
            jwt_key_file keys-es512.json keyval;
            echozn "ES512 OK";
        }

        location /ps256 {
            jwt_key_file keys-ps256.json keyval;
            echozn "PS256 OK";
        }

        location /ps384 {
            jwt_key_file keys-ps384.json keyval;
            echozn "PS384 OK";
        }

        location /ps512 {
            jwt_key_file keys-ps512.json keyval;
            echozn "PS512 OK";
        }

        location /eddsa {
            jwt_key_file keys-eddsa.json keyval;
            echozn "EdDSA OK";
        }

        location /jwks-rs256 {
            jwt_key_file keys-jwks-rs256.json jwks;
            echozn "JWKS RS256 OK";
        }

        # ── Public endpoint ───────────────────────────────────────────

        location /public {
            echozn "Public content";
        }
    }
}

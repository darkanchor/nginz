worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    js_engine qjs;
    js_path ".";
    js_import jwt_subreq from jwt_keyrequest_subrequest.js;

    jwt_key_request /keyval-http keyval;

    server {
        listen 8888;

        set $jwks_url_inherited "/keyval-server";
        jwt_key_request $jwks_url_inherited keyval;

        # JWKS endpoint — serves an HMAC key as JWKS
        location /jwks-endpoint {
            return 200 '{"keys":[{"kty":"oct","kid":"subreq-key","k":"c3VicmVxLXNlY3JldC1oczI1Ni10ZXN0LTMyYnl0ZXMh","alg":"HS256"}]}';
            add_header Content-Type application/json;
        }

        location /jwks-a {
            return 200 '{"keys":[{"kty":"oct","kid":"kid-a","k":"c3VicmVxLXNlY3JldC1hLWhzMjU2LXRlc3QtMzJieXRlcyEh","alg":"HS256"}]}';
            add_header Content-Type application/json;
        }

        location /jwks-b {
            return 200 '{"keys":[{"kty":"oct","kid":"kid-b","k":"c3VicmVxLXNlY3JldC1iLWhzMjU2LXRlc3QtMzJieXRlcyEh","alg":"HS256"}]}';
            add_header Content-Type application/json;
        }

        location /keyval-endpoint {
            return 200 '{"keyval-kid":"subreq-keyval-secret-hs256-32bytes!!"}';
            add_header Content-Type application/json;
        }

        location /keyval-http {
            return 200 '{"http-kid":"subreq-http-secret-hs256-32bytes!!"}';
            add_header Content-Type application/json;
        }

        location /keyval-server {
            return 200 '{"server-kid":"subreq-server-secret-hs256-32bytes!!"}';
            add_header Content-Type application/json;
        }

        location /keyval-location {
            return 200 '{"location-kid":"subreq-location-secret-hs256-32bytes"}';
            add_header Content-Type application/json;
        }

        location /keyval-dup-valid {
            return 200 '{"dup-kid":"dup-secret-valid-hs256-32bytes!!"}';
            add_header Content-Type application/json;
        }

        location /keyval-dup-invalid {
            return 200 '{"dup-kid":"dup-secret-wrong-hs256-32bytes!!"}';
            add_header Content-Type application/json;
        }

        location /jwks-bad-body {
            return 200 '{"keys":[invalid-json]}';
            add_header Content-Type application/json;
        }

        location /jwks-compressed {
            proxy_pass http://127.0.0.1:19005/;
        }

        location /keyval-order-a {
            proxy_pass http://127.0.0.1:19005/order-a;
        }

        location /keyval-order-b {
            proxy_pass http://127.0.0.1:19005/order-b;
        }

        location /keyval-order-c {
            proxy_pass http://127.0.0.1:19005/order-c;
        }

        # Protected location that fetches keys via subrequest
        location /protected {
            jwt_key_request /jwks-endpoint;
            echozn "KEYREQUEST OK";
        }

        # Variable-based key request URL — uses nginx variable for URL
        set $jwks_url "/jwks-endpoint";
        location /protected-var {
            jwt_key_request $jwks_url;
            echozn "KEYREQUEST OK";
        }

        location /protected-multi {
            jwt_key_request /jwks-a;
            jwt_key_request /jwks-b;
            echozn "KEYREQUEST MULTI OK";
        }

        location /jwks-c {
            return 200 '{"keys":[{"kty":"oct","kid":"kid-c","k":"c3VicmVxLXNlY3JldC1jLWhzMjU2LXRlc3QtMzJieXRlcyEh","alg":"HS256"}]}';
            add_header Content-Type application/json;
        }

        location /protected-triple {
            jwt_key_request /jwks-a;
            jwt_key_request /jwks-b;
            jwt_key_request /jwks-c;
            echozn "KEYREQUEST TRIPLE OK";
        }

        location /protected-order {
            jwt_key_request /keyval-order-a keyval;
            jwt_key_request /keyval-order-b keyval;
            jwt_key_request /keyval-order-c keyval;
            echozn "KEYREQUEST ORDER OK";
        }

        location /protected-keyval {
            jwt_key_request /keyval-endpoint keyval;
            echozn "KEYREQUEST KEYVAL OK";
        }

        location /protected-dup-a {
            jwt_key_request /keyval-dup-invalid keyval;
            jwt_key_request /keyval-dup-valid keyval;
            echozn "KEYREQUEST DUP A OK";
        }

        location /protected-dup-b {
            jwt_key_request /keyval-dup-valid keyval;
            jwt_key_request /keyval-dup-invalid keyval;
            echozn "KEYREQUEST DUP B OK";
        }

        location /protected-mixed-a {
            jwt_key_file dup-local-invalid.json keyval;
            jwt_key_request /keyval-dup-valid keyval;
            echozn "KEYREQUEST MIXED A OK";
        }

        location /protected-mixed-b {
            jwt_key_file dup-local.json keyval;
            jwt_key_request /keyval-dup-invalid keyval;
            echozn "KEYREQUEST MIXED B OK";
        }

        location /protected-bad-body {
            jwt_key_request /jwks-bad-body;
            echozn "KEYREQUEST BAD BODY";
        }

        location /protected-compressed {
            jwt_key_request /jwks-compressed;
            echozn "KEYREQUEST COMPRESSED";
        }

        location /protected-sub-inner {
            jwt_key_request /jwks-endpoint;
            echozn "KEYREQUEST SUB INNER OK";
        }

        location /nested-probe {
            jwt_secret off;
            js_content jwt_subreq.probe;
        }

        # Empty variable URL — variable is defined but empty at request time
        set $empty_jwt_url "";
        location /protected-empty-var-url {
            jwt_key_request $empty_jwt_url;
            echozn "SHOULD NOT REACH";
        }

        # Missing variable URL — header-based variable not sent by client
        location /protected-missing-var-url {
            jwt_key_request $http_x_jwt_key_url;
            echozn "SHOULD NOT REACH";
        }

        # Invalid runtime URI — non-empty variable that should fail ngx_http_subrequest()
        set $invalid_jwt_url "http://127.0.0.1:19005/order-a";
        location /protected-invalid-var-url {
            jwt_key_request $invalid_jwt_url;
            echozn "SHOULD NOT REACH";
        }

        location /inherit-parent {
            jwt_key_request /keyval-dup-invalid keyval;

            location /inherit-parent/child {
                jwt_key_request /keyval-dup-valid keyval;
                echozn "KEYREQUEST INHERIT OK";
            }
        }

        location /matrix-inherited {
            echozn "KEYREQUEST MATRIX INHERITED OK";
        }

        location /matrix-override {
            jwt_key_request /keyval-location keyval;
            echozn "KEYREQUEST MATRIX OVERRIDE OK";
        }

        # Public location (no JWT required)
        location /public {
            jwt_secret off;
            echozn "public";
        }

        location / {
            echozn "root";
        }
    }
}

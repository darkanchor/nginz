worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        location /protected {
            jwt_key_request /mock-jwks;
            echozn "KEYREQUEST";
        }
    }
}

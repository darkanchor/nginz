worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        # ── Claim validation: eq operator ─────────────────────────────

        location /require-eq {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim role eq admin;
            echozn "OK";
        }

        # ── Claim validation: !eq operator ────────────────────────────

        location /require-neq {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim role !eq banned;
            echozn "OK";
        }

        # ── Numeric operators: gt, lt ─────────────────────────────────

        location /require-gt {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim level gt 5;
            echozn "OK";
        }

        location /require-lt {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim level lt 100;
            echozn "OK";
        }

        # ── Multiple claims ───────────────────────────────────────────

        location /require-multi {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim role eq admin;
            jwt_require_claim department eq engineering;
            jwt_require_claim level gt 3;
            echozn "OK";
        }

        # ── Missing claim (eq fails, !eq passes) ──────────────────────

        location /require-missing-eq {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim ghost eq value;
            echozn "OK";
        }

        location /require-missing-neq {
            jwt_secret "require-test-secret-hs256";
            jwt_require_claim ghost !eq value;
            echozn "OK";
        }

        # ── jwt_validate_exp off ──────────────────────────────────────

        location /no-exp-check {
            jwt_secret "require-test-secret-hs256";
            jwt_validate_exp off;
            echozn "OK";
        }

        # ── jwt_leeway ────────────────────────────────────────────────

        location /leeway {
            jwt_secret "require-test-secret-hs256";
            jwt_leeway 300;
            echozn "OK";
        }

        # ── Public endpoint ───────────────────────────────────────────

        location /public {
            echozn "Public";
        }
    }
}

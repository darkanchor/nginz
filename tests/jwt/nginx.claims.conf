worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # ── Claim variable extraction ─────────────────────────────────

        location /claim-sub {
            jwt_secret "my-claim-test-secret-hs256";
            jwt_claim $jwt_sub sub;
            jwt_claim $jwt_iss iss;
            jwt_claim $jwt_name name;
            jwt_claim $jwt_role role;

            # Echo variables back via headers
            add_header X-Jwt-Sub $jwt_sub always;
            add_header X-Jwt-Iss $jwt_iss always;
            add_header X-Jwt-Name $jwt_name always;
            add_header X-Jwt-Role $jwt_role always;
            echozn "OK";
        }

        location /header-values {
            jwt_secret "my-claim-test-secret-hs256";
            jwt_header $jwt_typ typ;
            jwt_header $jwt_kid kid;

            add_header X-Jwt-Typ $jwt_typ always;
            add_header X-Jwt-Kid $jwt_kid always;
            echozn "OK";
        }

        location /header-nested {
            jwt_secret "my-claim-test-secret-hs256";
            jwt_header $jwt_nested_value meta.inner;
            add_header X-Jwt-Nested-Value $jwt_nested_value always;
            echozn "OK";
        }

        # ── $jwt_claims variable (full payload JSON) ──────────────────

        location /claims-json {
            jwt_secret "my-claims-json-secret-hs256";
            add_header X-Jwt-Claims $jwt_claims always;
            echozn "OK";
        }

        # ── $jwt_nowtime variable ─────────────────────────────────────

        location /nowtime {
            jwt_secret "my-nowtime-secret-hs256";
            add_header X-Jwt-Nowtime $jwt_nowtime always;
            echozn "OK";
        }

        # ── Integer claim ─────────────────────────────────────────────

        location /claim-int {
            jwt_secret "my-int-claim-secret-hs256";
            jwt_claim $jwt_iat iat;
            add_header X-Jwt-Iat $jwt_iat always;
            echozn "OK";
        }

        location /claim-nested {
            jwt_secret "my-claim-test-secret-hs256";
            jwt_claim $jwt_profile_name profile.name;
            jwt_claim $jwt_role0 roles.0;
            add_header X-Jwt-Profile-Name $jwt_profile_name always;
            add_header X-Jwt-Role0 $jwt_role0 always;
            echozn "OK";
        }

        # ── Public endpoint ───────────────────────────────────────────

        location /public {
            echozn "Public";
        }
    }
}

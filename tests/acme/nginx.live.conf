daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;
worker_processes 2;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;
    resolver 127.0.0.1:8053 ipv6=off;

    acme on;
    acme_email test@example.com;
    acme_storage tests/acme/runtime/acme;
    acme_server https://localhost:14000/dir;
    acme_trusted_certificate pebble.minica.pem;

    server {
        listen 8888;
        server_name live-acme.test;

        acme_domain live-acme.test;

        location /ready {
            echozn "ready ok";
        }

        location / {
            default_type application/json;
            echozn '{"status":"ok","server":"live-acme.test"}';
        }
    }
}

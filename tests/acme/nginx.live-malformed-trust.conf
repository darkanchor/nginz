daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;
worker_processes 1;

events { worker_connections 16; }

http {
    acme on;
    acme_email test@example.com;
    acme_storage tests/acme/runtime/acme;
    acme_server https://localhost:14000/dir;
    acme_trusted_certificate malformed-ca.pem;
    server {
        listen 18888;
        acme_domain live-acme.test;
        location / { echozn "ok"; }
    }
}

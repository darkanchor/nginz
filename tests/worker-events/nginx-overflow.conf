daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Small ring - only 4 entries, will overflow quickly
        location /worker-events {
            worker_events_api;
            worker_events_zone overflow_test;
            worker_events_channel events;
            worker_events_ring_size 4;
        }

        location / {
            echozn "ok";
        }
    }
}

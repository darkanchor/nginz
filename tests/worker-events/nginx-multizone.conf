daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        location /zone-a {
            worker_events_api;
            worker_events_zone zone_a;
            worker_events_channel shared;
            worker_events_ring_size 4;
        }

        location /zone-b {
            worker_events_api;
            worker_events_zone zone_b;
            worker_events_channel shared;
            worker_events_ring_size 16;
        }

        location / {
            echozn "ok";
        }
    }
}

daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        location /one {
            worker_events_api;
            worker_events_zone shared;
            worker_events_channel cache.invalidate;
            worker_events_ring_size 16;
        }

        location /two {
            worker_events_api;
            worker_events_zone shared;
            worker_events_channel cache.invalidate;
            worker_events_ring_size 64;
        }
    }
}

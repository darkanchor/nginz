daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Missing zone name - should fail config load
        location /no-zone {
            worker_events_api;
            worker_events_channel test;
            worker_events_ring_size 64;
        }

        # Zone with small ring size
        location /small-ring {
            worker_events_api;
            worker_events_zone small;
            worker_events_channel test;
            worker_events_ring_size 16;
        }

        location / {
            echozn "ok";
        }
    }
}

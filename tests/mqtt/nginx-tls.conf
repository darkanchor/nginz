daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

stream {
    mqtt_preread on;

    server {
        listen 18893 ssl;

        ssl_certificate     fixtures/server.crt;
        ssl_certificate_key fixtures/server.key;

        mqtt_preread on;
        mqtt on;
        mqtt_set_connect clientid "$mqtt_preread_clientid:tls";
        mqtt_set_connect username "$mqtt_preread_username@tls-edge";
        mqtt_set_connect password "tls-secret";

        proxy_pass 127.0.0.1:18884;
    }
}

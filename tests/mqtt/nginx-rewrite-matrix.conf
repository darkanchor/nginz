daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

stream {
    mqtt_preread on;

    server {
        listen 18889;

        mqtt_preread on;
        mqtt on;
        mqtt_set_connect username "";
        mqtt_set_connect password "";

        proxy_pass 127.0.0.1:18884;
    }

    server {
        listen 18890;

        mqtt_preread on;
        mqtt on;
        mqtt_set_connect password "added-secret";

        proxy_pass 127.0.0.1:18884;
    }

    server {
        listen 18891;

        mqtt_preread on;
        mqtt on;
        mqtt_set_connect username "added-user";

        proxy_pass 127.0.0.1:18884;
    }

    server {
        listen 18892;

        mqtt_preread on;
        mqtt on;
        mqtt_set_connect password "new-secret";

        proxy_pass 127.0.0.1:18884;
    }
}

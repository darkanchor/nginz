daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    js_engine qjs;

    js_path ".";
    js_import main from pgrest_subrequest.js;

    server {
        listen 8888;

        # ── Internal pgrest locations (subrequest targets) ────────────

        location /_pgrest/api/ {
            internal;
            pgrest_pass "host=127.0.0.1 port=15432 dbname=test user=test password=test";
            pgrest_schemas "public";
        }

        location /_pgrest/rpc/ {
            internal;
            pgrest_pass "host=127.0.0.1 port=15432 dbname=test user=test password=test";
            pgrest_schemas "public";
        }

        # ── njs subrequest handlers ────────────────────────────────────

        # GET /njs/pgrest/users  → subrequest /_pgrest/api/users
        location /njs/pgrest/users {
            js_content main.pgrest_get_users;
        }

        # GET /njs/pgrest/users?id=1&select=id,name
        location /njs/pgrest/users-filtered {
            js_content main.pgrest_get_users_filtered;
        }

        # POST /njs/pgrest/users  with JSON body
        location /njs/pgrest/users-create {
            client_body_in_single_buffer on;
            js_content main.pgrest_create_user;
        }

        # PATCH /njs/pgrest/users?id=eq.1
        location /njs/pgrest/users-update {
            client_body_in_single_buffer on;
            js_content main.pgrest_update_user;
        }

        # DELETE /njs/pgrest/users?id=eq.1
        location /njs/pgrest/users-delete {
            js_content main.pgrest_delete_user;
        }

        # RPC call
        location /njs/pgrest/rpc {
            js_content main.pgrest_rpc;
        }

        # ── Regular endpoint ───────────────────────────────────────────

        location / {
            echozn "Hello World";
        }
    }
}

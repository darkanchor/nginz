daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    js_engine qjs;

    js_path ".";
    js_import main from combo_subrequest.js;

    server {
        listen 8888;

        # ── Internal Redis locations ──────────────────────────────────

        location /_redis/get/    { internal; redis_pass 127.0.0.1:16379; }
        location /_redis/get_set/{ internal; redis_pass 127.0.0.1:16379; redis_command get; }
        location /_redis/set/    { internal; redis_pass 127.0.0.1:16379; redis_command set; }
        location /_redis/del/    { internal; redis_pass 127.0.0.1:16379; redis_command del; }
        location /_redis/incr/   { internal; redis_pass 127.0.0.1:16379; redis_command incr; }
        location /_redis/decr/   { internal; redis_pass 127.0.0.1:16379; redis_command decr; }
        location /_redis/ttl/    { internal; redis_pass 127.0.0.1:16379; redis_command ttl; }
        location /_redis/exists/ { internal; redis_pass 127.0.0.1:16379; redis_command exists; }
        location /_redis/ping    { internal; redis_pass 127.0.0.1:16379; redis_command ping; }
        location /_redis/strlen/ { internal; redis_pass 127.0.0.1:16379; redis_command strlen; }
        location /_redis/hget/   { internal; redis_pass 127.0.0.1:16379; redis_command hget; }
        location /_redis/mget    { internal; redis_pass 127.0.0.1:16379; redis_command mget; }

        # Shared-key pairs for write-then-read
        location /_redis/combo_set { internal; redis_pass 127.0.0.1:16379; redis_command set; redis_key combo-data; }
        location /_redis/combo_get { internal; redis_pass 127.0.0.1:16379; redis_command get; redis_key combo-data; }
        location /_redis/cache_set { internal; redis_pass 127.0.0.1:16379; redis_command set; redis_key cache-data; }
        location /_redis/cache_get { internal; redis_pass 127.0.0.1:16379; redis_command get; redis_key cache-data; }
        location /_redis/str_set   { internal; redis_pass 127.0.0.1:16379; redis_command set; redis_key str-data; }
        location /_redis/str_get   { internal; redis_pass 127.0.0.1:16379; redis_command get; redis_key str-data; }

        # ── Internal pgrest location ──────────────────────────────────

        location /_pgrest/api/ {
            internal;
            pgrest_pass "host=127.0.0.1 port=15432 dbname=test user=test password=test";
            pgrest_schemas "public";
        }

        # ── Combo handlers (existing) ─────────────────────────────────

        location /combo/redis-write-read      { client_body_in_single_buffer on; js_content main.redis_write_then_read; }
        location /combo/redis-incr-twice      { js_content main.redis_incr_twice; }
        location /combo/redis-pgrest-parallel { js_content main.redis_and_pgrest; }
        location /combo/conditional           { js_content main.redis_check_then_pgrest; }
        location /combo/read-through          { js_content main.read_through_cache; }
        location /combo/counter-and-data      { js_content main.counter_and_data; }

        # ── Combo handlers (new) ──────────────────────────────────────

        # 1. TTL-aware refresh: GET + TTL → if expiring, PGrest refresh
        location /combo/ttl-refresh { js_content main.ttl_aware_refresh; }

        # 2. DEL + refresh: DEL old → PGrest → SET new
        location /combo/del-refresh { js_content main.del_and_refresh; }

        # 3. DECR rate gate: DECR → if >= 0, allow PGrest
        location /combo/decr-gate { js_content main.decr_rate_gate; }

        # 4. Hash config → PGrest query: HGET config → parametrize select
        location /combo/hash-config { js_content main.hash_config_query; }

        # 5. MGET batch + PGrest fallback per missing key
        location /combo/mget-fallback { js_content main.mget_fallback; }

        # 6. EXISTS guard → PGrest write: check exists → allow/deny POST
        location /combo/exists-guard { client_body_in_single_buffer on; js_content main.exists_guard; }

        # 7. PING health → PGrest: PING redis → if ok, query PGrest
        location /combo/ping-gate { js_content main.ping_then_pgrest; }

        # 8. STRLEN validation: check cached value length → refresh if short
        location /combo/strlen-refresh { js_content main.strlen_refresh; }

        location / {
            echozn "Hello World";
        }
    }
}

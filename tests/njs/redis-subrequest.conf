daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    js_engine qjs;

    js_path ".";
    js_import main from redis_subrequest.js;

    server {
        listen 8888;

        # ── Internal Redis locations (subrequest targets) ──────────────

        location /_redis/get/ {
            internal;
            redis_pass 127.0.0.1:16379;
        }

        location /_redis/set/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command set;
        }

        location /_redis/del/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command del;
        }

        location /_redis/incr/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command incr;
        }

        location /_redis/decr/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command decr;
        }

        location /_redis/exists/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command exists;
        }

        location /_redis/ttl/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command ttl;
        }

        location /_redis/ping {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command ping;
        }

        location /_redis/strlen/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command strlen;
        }

        location /_redis/mget {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command mget;
        }

        location /_redis/hget/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command hget;
        }

        location /_redis/hset/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command hset;
        }

        location /_redis/hdel/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command hdel;
        }

        # ── njs subrequest handlers ────────────────────────────────────

        location /njs/redis/get     { js_content main.redis_get; }
        location /njs/redis/set     { client_body_in_single_buffer on; js_content main.redis_set; }
        location /njs/redis/del     { js_content main.redis_del; }
        location /njs/redis/incr    { js_content main.redis_incr; }
        location /njs/redis/decr    { js_content main.redis_decr; }
        location /njs/redis/exists  { js_content main.redis_exists; }
        location /njs/redis/ttl     { js_content main.redis_ttl; }
        location /njs/redis/ping    { js_content main.redis_ping; }
        location /njs/redis/strlen  { js_content main.redis_strlen; }
        location /njs/redis/mget    { js_content main.redis_mget; }
        location /njs/redis/parallel { js_content main.redis_parallel; }
        location /njs/redis/hget    { js_content main.redis_hget; }
        location /njs/redis/hset    { client_body_in_single_buffer on; js_content main.redis_hset; }
        location /njs/redis/hdel    { js_content main.redis_hdel; }

        # ── Regular endpoint ───────────────────────────────────────────

        location / {
            echozn "Hello World";
        }
    }
}

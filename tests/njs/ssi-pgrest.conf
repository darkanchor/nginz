daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Internal pgrest target
        location /_pgrest/api/ {
            internal;
            pgrest_pass "host=127.0.0.1 port=15432 dbname=test user=test password=test";
            pgrest_schemas "public";
        }

        # SSI page that includes pgrest as a subrequest
        location /ssi/users {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_pgrest/api/users' -->";
        }

        # Mirror test: mirror fires pgrest subrequest in parallel
        location /mirror/users {
            mirror /_pgrest/api/users;
            echozn '{"mirror":"ok"}';
        }

        location / {
            echozn "Hello World";
        }
    }
}

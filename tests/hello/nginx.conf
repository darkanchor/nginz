daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Basic hello - outputs "hello"
        location /hello {
            hello;
        }

        # Exact hello location to ensure exact-match locations behave the same
        location = /hello-exact {
            hello;
        }

        # Test that hello works on different paths
        location /greeting {
            hello;
        }

        # Nested location with hello
        location /api {
            location /api/hello {
                hello;
            }
        }

        location /hello-ssi-parent {
            ssi on;
            default_type text/html;
            return 200 '<!--# include virtual="/hello-ssi-child" -->';
        }

        location /hello-ssi-child {
            internal;
            hello;
        }

        location /hello-auth-parent {
            auth_request /hello-auth-child;
            proxy_pass http://127.0.0.1:8888/plain-text-auth-ok;
        }

        location /hello-auth-child {
            internal;
            hello;
        }

        location /hello-mirror-parent {
            mirror /hello-mirror-child;
            proxy_pass http://127.0.0.1:8888/plain-text-mirror-ok;
        }

        location /hello-mirror-child {
            internal;
            hello;
        }

        location /plain-text-auth-ok {
            return 200 "auth-ok";
        }

        location /plain-text-mirror-ok {
            return 200 "mirror-ok";
        }

        # Non-hello control endpoint should not be affected
        location /plain {
            return 204;
        }
    }
}

daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Service discovery - get healthy instances of a service
        location /services/ {
            consul_services 127.0.0.1:18500;
            add_header X-Consul-Service-Healthy-Count $consul_service_healthy_count always;
            add_header X-Consul-KV-Found $consul_kv_found always;
            add_header X-Consul-Lookup-Error $consul_lookup_error always;
        }

        # Service discovery with fixed service name
        location /api-service {
            consul_services 127.0.0.1:18500;
            consul_service api-service;
            add_header X-Consul-Service-Healthy-Count $consul_service_healthy_count always;
        }

        # Service discovery with fixed name and filters
        location /api-primary {
            consul_services 127.0.0.1:18500;
            consul_service api-service;
            consul_tag primary;
            consul_dc dc-west;
            consul_token test-token-123;
            add_header X-Consul-Service-Healthy-Count $consul_service_healthy_count always;
        }

        # KV store lookup
        location /kv/ {
            consul_kv 127.0.0.1:18500;
            add_header X-Consul-KV-Value $consul_kv_value always;
            add_header X-Consul-KV-Found $consul_kv_found always;
            add_header X-Consul-Lookup-Error $consul_lookup_error always;
        }

        # KV store with fixed key
        location /config/timeout {
            consul_kv 127.0.0.1:18500;
            consul_key config/app/timeout;
            add_header X-Consul-KV-Value $consul_kv_value always;
            add_header X-Consul-KV-Found $consul_kv_found always;
            add_header X-Consul-Lookup-Error $consul_lookup_error always;
        }

        # KV store with empty-string value
        location /config/empty {
            consul_kv 127.0.0.1:18500;
            consul_key config/app/empty;
            add_header X-Consul-KV-Value $consul_kv_value always;
            add_header X-Consul-KV-Found $consul_kv_found always;
            add_header X-Consul-Lookup-Error $consul_lookup_error always;
        }

        # KV store with JSON-looking value
        location /config/json {
            consul_kv 127.0.0.1:18500;
            consul_key config/app/json;
            add_header X-Consul-KV-Value $consul_kv_value always;
            add_header X-Consul-KV-Found $consul_kv_found always;
            add_header X-Consul-Lookup-Error $consul_lookup_error always;
        }

        location /config/error {
            consul_kv 127.0.0.1:18500;
            consul_key config/app/error;
            add_header X-Consul-KV-Found $consul_kv_found always;
            add_header X-Consul-Lookup-Error $consul_lookup_error always;
        }

        # Catalog - list all services
        location /catalog {
            consul_catalog 127.0.0.1:18500;
        }
    }
}

worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream backend {
        server 127.0.0.1:19002;
    }

    server {
        listen 8888;

        # Proxy to mock backend - capture Cache-Tag headers
        location /api/ {
            cache_tags;
            proxy_pass http://backend;
            proxy_pass_header Cache-Tag;
            add_header X-Cache-Tags-Last-Purged $cache_tags_last_purged always;
            add_header X-Cache-Tags-Last-Tag $cache_tags_last_tag always;
            add_header X-Cache-Tags-Last-Error $cache_tags_last_error always;
        }

        location /spaced/ {
            cache_tags;
            proxy_pass http://backend;
            proxy_pass_header Cache-Tag;
        }

        location /products/ {
            cache_tags;
            proxy_pass http://backend;
            proxy_pass_header Cache-Tag;
        }

        location /categories/ {
            cache_tags;
            proxy_pass http://backend;
            proxy_pass_header Cache-Tag;
        }

        # Purge endpoint
        location /cache/purge {
            cache_tags_purge;
            add_header X-Cache-Tags-Last-Purged $cache_tags_last_purged always;
            add_header X-Cache-Tags-Last-Tag $cache_tags_last_tag always;
            add_header X-Cache-Tags-Last-Error $cache_tags_last_error always;
        }

        # Health check (no proxy needed)
        location /health {
            echozn 'ok';
        }
    }
}

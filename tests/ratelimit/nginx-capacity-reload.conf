worker_processes 2;
daemon off;
error_log logs/error.log notice;
pid logs/nginx.pid;

events {
    worker_connections 2048;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        location /fill {
            ratelimit_rate 100000r/s;
            ratelimit_key $arg_k;
            echozn "fill ok";
        }

        location /metrics {
            add_header X-Ratelimit-Entries $ratelimit_entries always;
            add_header X-Ratelimit-Capacity-Rejected $ratelimit_capacity_rejected always;
            add_header X-Ratelimit-Reclaimed $ratelimit_reclaimed always;
            echozn "metrics";
        }
    }
}

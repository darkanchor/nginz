worker_processes 2;
daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream api_backend {
        server 127.0.0.1:19002;
        dynamic_upstreams_managed;
    }

    upstream static_backend {
        server 127.0.0.1:19002;
        dynamic_upstreams_managed;
    }

    server {
        listen 8888;

        location /dynamic-upstreams {
            dynamic_upstreams_api;
            dynamic_upstreams_target api_backend;
            dynamic_upstreams_source consul;
            dynamic_upstreams_consul_address 127.0.0.1:18500;
            dynamic_upstreams_consul_service api-backend;
            dynamic_upstreams_consul_tag primary;
            dynamic_upstreams_consul_token test-token-123;
            dynamic_upstreams_consul_dc dc-west;
            dynamic_upstreams_refresh 150;
            dynamic_upstreams_worker_events_channel upstreams;
            dynamic_upstreams_worker_events_zone dynamic_upstreams_consul_bus;
        }

        location /dynamic-upstreams-static {
            dynamic_upstreams_api;
            dynamic_upstreams_target static_backend;
            dynamic_upstreams_source static;
            dynamic_upstreams_source_file /tmp/nginz-dynamic-upstreams-consul-liveness.json;
            dynamic_upstreams_refresh 150;
            dynamic_upstreams_worker_events_channel upstreams;
            dynamic_upstreams_worker_events_zone dynamic_upstreams_consul_bus;
        }

        location /worker-events {
            worker_events_api;
            worker_events_zone dynamic_upstreams_consul_bus;
            worker_events_channel upstreams;
            worker_events_ring_size 64;
        }

        location / {
            echozn "ok";
        }
    }
}

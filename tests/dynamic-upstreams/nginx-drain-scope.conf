daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream blue_backend {
        upstream_balancer_sticky_header x_route;
        upstream_balancer_fallback off;
        server 127.0.0.1:19002;
        dynamic_upstreams_managed;
    }

    upstream green_backend {
        upstream_balancer_sticky_header x_route;
        upstream_balancer_fallback off;
        server 127.0.0.1:19002;
        dynamic_upstreams_managed;
    }

    server {
        listen 8888;

        location /dynamic-upstreams-blue {
            dynamic_upstreams_api;
            dynamic_upstreams_target blue_backend;
        }

        location /dynamic-upstreams-green {
            dynamic_upstreams_api;
            dynamic_upstreams_target green_backend;
        }

        location /blue {
            proxy_pass http://blue_backend;
        }

        location /green {
            proxy_pass http://green_backend;
        }
    }
}

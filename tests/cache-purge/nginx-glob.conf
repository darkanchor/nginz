daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;

    server {
        listen 8888;

        location /cache-purge {
            cache_purge_api;
            cache_purge_zone default;
            cache_purge_match glob;
            cache_purge_authorize off;
            cache_purge_max_keys 4;
        }
    }
}

daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Validated endpoint - requires name (string) and age (number >= 0)
        location /api/users {
            jsonschema '{"type":"object","required":["name","email"],"properties":{"name":{"type":"string","minLength":1},"email":{"type":"string"},"age":{"type":"number","minimum":20}}}';
            jsonschema_body_max_size 128;
            echoz_read_request_body;
            echozn '{"status":"ok"}';
        }

        # Simple type validation
        location /api/simple {
            jsonschema '{"type":"object"}';
            echoz_read_request_body;
            echozn '{"status":"ok"}';
        }

        # Integer validation
        location /api/integer {
            jsonschema '{"type":"object","required":["count"],"properties":{"count":{"type":"integer","minimum":1}}}';
            echoz_read_request_body;
            echozn '{"status":"ok"}';
        }

        # Non-validated endpoint
        location / {
            echozn '{"status":"ok"}';
        }
    }
}

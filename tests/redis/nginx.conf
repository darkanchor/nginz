worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Redis GET endpoint - key from URI path
        location /get/ {
            redis_pass 127.0.0.1:16379;
        }

        # Redis GET endpoint with static key
        location /static-key {
            redis_pass 127.0.0.1:16379;
            redis_key test-key;
        }

        # Redis SET endpoint
        location /set/ {
            redis_pass 127.0.0.1:16379;
            redis_command set;
        }

        location /set-spill/ {
            client_body_buffer_size 1;
            client_body_in_file_only on;
            redis_pass 127.0.0.1:16379;
            redis_command set;
        }

        # Redis DEL endpoint
        location /del/ {
            redis_pass 127.0.0.1:16379;
            redis_command del;
        }

        # Redis INCR endpoint
        location /incr/ {
            redis_pass 127.0.0.1:16379;
            redis_command incr;
        }

        # Redis EXPIRE endpoint
        location /expire/ {
            redis_pass 127.0.0.1:16379;
            redis_command expire;
        }

        location /expire-spill/ {
            client_body_buffer_size 1;
            client_body_in_file_only on;
            redis_pass 127.0.0.1:16379;
            redis_command expire;
        }

        # Redis MGET endpoint
        location /mget {
            redis_pass 127.0.0.1:16379;
            redis_command mget;
        }

        # Redis DECR endpoint
        location /decr/ {
            redis_pass 127.0.0.1:16379;
            redis_command decr;
        }

        # Redis EXISTS endpoint
        location /exists/ {
            redis_pass 127.0.0.1:16379;
            redis_command exists;
        }

        # Redis TTL endpoint
        location /ttl/ {
            redis_pass 127.0.0.1:16379;
            redis_command ttl;
        }

        # Redis PING endpoint
        location /ping {
            redis_pass 127.0.0.1:16379;
            redis_command ping;
        }

        # Redis STRLEN endpoint
        location /strlen/ {
            redis_pass 127.0.0.1:16379;
            redis_command strlen;
        }

        # Redis HGET endpoint
        location /hget/ {
            redis_pass 127.0.0.1:16379;
            redis_command hget;
        }

        # Redis HSET endpoint
        location /hset/ {
            redis_pass 127.0.0.1:16379;
            redis_command hset;
        }

        location /hset-spill/ {
            client_body_buffer_size 1;
            client_body_in_file_only on;
            redis_pass 127.0.0.1:16379;
            redis_command hset;
        }

        # Redis HDEL endpoint
        location /hdel/ {
            redis_pass 127.0.0.1:16379;
            redis_command hdel;
        }

        location /vars/get-hit {
            redis_pass 127.0.0.1:16379;
            redis_key get/mykey;
            add_header X-Redis-Last-Value $redis_last_value always;
            add_header X-Redis-Last-Exists $redis_last_exists always;
            add_header X-Redis-Last-Error $redis_last_error always;
            add_header X-Redis-Connection-State $redis_connection_state always;
        }

        location /vars/get-miss {
            redis_pass 127.0.0.1:16379;
            redis_key get/nonexistent-key;
            add_header X-Redis-Last-Value $redis_last_value always;
            add_header X-Redis-Last-Exists $redis_last_exists always;
            add_header X-Redis-Last-Error $redis_last_error always;
            add_header X-Redis-Connection-State $redis_connection_state always;
        }

        location /vars/incr-error {
            redis_pass 127.0.0.1:16379;
            redis_command incr;
            redis_key incr/not-a-number;
            add_header X-Redis-Last-Value $redis_last_value always;
            add_header X-Redis-Last-Exists $redis_last_exists always;
            add_header X-Redis-Last-Error $redis_last_error always;
            add_header X-Redis-Connection-State $redis_connection_state always;
        }

        location /vars/down/ {
            redis_pass 127.0.0.1:16378;
            add_header X-Redis-Last-Value $redis_last_value always;
            add_header X-Redis-Last-Exists $redis_last_exists always;
            add_header X-Redis-Last-Error $redis_last_error always;
            add_header X-Redis-Connection-State $redis_connection_state always;
        }

        # Regular endpoint for testing
        location / {
            echozn "Hello World";
        }
    }
}

worker_processes 1;
error_log logs/error.log debug;
daemon off;
master_process off;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    wechatpay_apiclient_key_file /home/kaiwu/Documents/gitea/nginz/tests/wechatpay/fixtures/test_private.pem;
    wechatpay_public_key_file /home/kaiwu/Documents/gitea/nginz/tests/wechatpay/fixtures/test_public.pem;
    wechatpay_apiclient_serial APICLIENTSERIAL123;
    wechatpay_serial PLATFORMSERIAL456;
    wechatpay_mch_id 1900001111;

    server {
        listen 8888;

        # Redis: internal location used as auth_request subrequest target
        location /_redis/get/ {
            internal;
            redis_pass 127.0.0.1:16379;
        }

        # pgrest: internal location used as auth_request subrequest target
        location /_pgrest/api/ {
            internal;
            pgrest_pass "host=127.0.0.1 port=15432 dbname=testdb user=postgres";
            pgrest_schemas "public";
        }

        # consul KV: internal location used as auth_request subrequest target
        location /_consul/kv/ {
            internal;
            consul_kv 127.0.0.1:18500;
        }

        # consul services: internal location used as auth_request subrequest target
        location /_consul/services/ {
            internal;
            consul_services 127.0.0.1:18500;
        }

        # consul catalog: internal location used as auth_request/SSI subrequest target
        location /_consul/catalog {
            internal;
            consul_catalog 127.0.0.1:18500;
        }

        # wechatpay proxy: internal location used as auth_request subrequest target
        location /_wechatpay/ {
            internal;
            wechatpay_proxy_pass http://127.0.0.1:19001;
        }

        # Gate gated by a Redis GET subrequest via auth_request
        location /redis-gate {
            auth_request /_redis/get/session-token;
            echozn "redis-granted";
        }

        # Gate gated by a pgrest GET subrequest via auth_request
        location /pg-gate {
            auth_request /_pgrest/api/permissions;
            echozn "pg-granted";
        }

        # Gate gated by consul KV subrequest via auth_request
        location /consul-kv-gate {
            auth_request /_consul/kv/feature-flag;
            echozn "consul-granted";
        }

        # Gate gated by consul services subrequest via auth_request
        location /consul-svc-gate {
            auth_request /_consul/services/api-service;
            echozn "consul-svc-granted";
        }

        # Gate gated by consul catalog subrequest via auth_request
        location /consul-catalog-gate {
            auth_request /_consul/catalog;
            echozn "consul-catalog-granted";
        }

        # Gate gated by wechatpay proxy subrequest via auth_request
        location /wechatpay-gate {
            auth_request /_wechatpay/pay;
            echozn "wechatpay-granted";
        }

        # Gate where wechatpay upstream returns error → auth_request denies
        location /wechatpay-deny-gate {
            auth_request /_wechatpay/fail;
            echozn "should-not-reach";
        }

        # SSI subrequests exercise foreground body-producing execution.
        location /ssi/redis {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_redis/get/session-token' -->";
        }

        location /ssi/pgrest {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_pgrest/api/permissions' -->";
        }

        location /ssi/consul-kv {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_consul/kv/feature-flag' -->";
        }

        location /ssi/consul-services {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_consul/services/api-service' -->";
        }

        location /ssi/consul-catalog {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_consul/catalog' -->";
        }

        location /ssi/wechatpay {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "<!--# include virtual='/_wechatpay/pay' -->";
        }

        # Mirror subrequests exercise background header-only execution.
        location /_redis/incr/ {
            internal;
            redis_pass 127.0.0.1:16379;
            redis_command incr;
        }

        location /mirror/redis {
            mirror /_redis/incr/mirror-counter;
            echozn '{"mirror":"redis"}';
        }

        location /mirror/pgrest {
            mirror /_pgrest/api/permissions;
            echozn '{"mirror":"pgrest"}';
        }

        location /mirror/consul-kv {
            mirror /_consul/kv/feature-flag;
            echozn '{"mirror":"consul-kv"}';
        }

        location /mirror/consul-catalog {
            mirror /_consul/catalog;
            echozn '{"mirror":"consul-catalog"}';
        }

        location /mirror/wechatpay {
            mirror /_wechatpay/pay;
            echozn '{"mirror":"wechatpay"}';
        }

        location / {
            echozn "Hello";
        }
    }
}

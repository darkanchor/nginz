daemon off;
error_log logs/error.log debug;
pid logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Basic echoz - outputs text with newline
        location /echo {
            echoz "hello world";
        }

        # Multiple echoz commands
        location /multi {
            echoz "line1";
            echoz "line2";
            echoz "line3";
        }

        # echozn - no newline
        location /echon {
            echozn "no";
            echozn "newline";
        }

        # echoz_duplicate - repeat string N times
        location /duplicate {
            echoz_duplicate 3 "abc";
        }

        # Variable interpolation
        location /vars {
            echoz "method: $request_method";
            echoz "uri: $uri";
        }

        # echoz_exec - internal redirect to named location
        location /exec {
            echoz_exec @target;
        }

        location @target {
            echoz "redirected!";
        }

        # echoz_exec - internal redirect to regular location
        location /exec2 {
            echoz_exec /echo;
        }

        # Request body echo
        location /body {
            echoz_read_request_body;
            echoz "body received:";
            echoz_request_body;
        }

        # Reading the variable without first reading a body must be safe and
        # produce an empty value rather than dereferencing a null request_body.
        location /body-variable-without-read {
            echozn "$echoz_request_body";
        }

        # Subrequest
        location /main {
            echoz "before";
            echoz_location_async /sub;
            echoz "after";
        }

        location /sub {
            echoz "sub-response";
        }

        # echozn as a subrequest target for auth_request
        location /auth-gate {
            auth_request /auth-ok;
            echozn "granted";
        }

        location /auth-ok {
            internal;
            echozn "ok";
        }

        # echozn as a subrequest target for SSI and mirror
        location /snippet {
            internal;
            echozn "X";
        }

        location /ssi-snippet {
            ssi on;
            ssi_types *;
            default_type text/html;
            echozn "pre<!--# include virtual='/snippet' -->post";
        }

        location /mirror-snippet {
            mirror /snippet;
            echozn "mirror-ok";
        }

        # Empty response (just headers)
        location /empty {
            echoz;
        }

        # Multiple arguments
        location /args {
            echoz hello world "from nginx";
        }

        location /flush {
            echoz "before flush";
            echoz_flush;
            echoz "after flush";
        }

        location /sleep {
            echoz_sleep 0.02;
            echozn "slept";
        }

        location /filtered {
            echoz_before_body "before|";
            echoz_after_body "|after";
            echoz_status 201 Created;
            echoz_header X-Echoz filtered;
            return 200 "body";
        }
    }
}

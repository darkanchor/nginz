daemon off;
error_log logs/error.log notice;
pid logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream backend {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_sticky_header X-Sticky-Key;
        upstream_balancer_fallback next;

        server 127.0.0.1:19002;
    }

    # Location with balancer directives — full proxy path
    server {
        listen 8888;

        location /bench/balancer {
            proxy_pass http://backend;
        }

        # Baseline: plain proxy without balancer module involvement
        location /bench/direct {
            proxy_pass http://backend;
        }

        # Healthy neighboring route (no upstream, echozn only)
        location / {
            echozn "healthy";
        }
    }
}

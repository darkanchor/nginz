daemon off;
error_log logs/error.log notice;
pid logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Small value (no suffix = default GET command, key from URI)
        location /bench/small {
            redis_pass 127.0.0.1:6379;
        }

        # Medium value
        location /bench/medium {
            redis_pass 127.0.0.1:6379;
        }

        # Large value
        location /bench/large {
            redis_pass 127.0.0.1:6379;
        }

        # Static key (avoids URI parsing overhead)
        location /bench/static {
            redis_pass 127.0.0.1:6379;
            redis_key static-value;
        }
    }
}

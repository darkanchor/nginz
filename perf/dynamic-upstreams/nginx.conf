worker_processes 2;
daemon off;
error_log logs/error.log notice;
pid logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream combo_backend {
        upstream_balancer_sticky_cookie route;
        upstream_balancer_fallback next;

        health_upstream_probe_interval 250ms;
        health_upstream_probe_timeout 100ms;
        health_upstream_probe_fails 1;
        health_upstream_probe_passes 1;
        health_upstream_probe_slow_start 500ms;

        health_upstream_peer_probe 127.0.0.1:19002 http://127.0.0.1:19002/probe;
        health_upstream_peer_probe 127.0.0.1:19003 http://127.0.0.1:19003/probe;

        server 127.0.0.1:19002;
        dynamic_upstreams_managed;
    }

    server {
        listen 8888;

        location /app/ {
            cache_tags;
            proxy_pass http://combo_backend;
            proxy_pass_header Cache-Tag;
            add_header X-Upstream-Addr $upstream_addr always;
        }

        location /dynamic-upstreams {
            dynamic_upstreams_api;
            dynamic_upstreams_target combo_backend;
            dynamic_upstreams_source static;
            dynamic_upstreams_worker_events_zone milestone2_bus;
            dynamic_upstreams_worker_events_channel milestone2;
        }

        location /worker-events {
            worker_events_api;
            worker_events_zone milestone2_bus;
            worker_events_channel milestone2;
            worker_events_ring_size 256;
        }

        location /cache-purge {
            cache_purge_api;
            cache_purge_zone default;
            cache_purge_match exact;
            cache_purge_authorize off;
            cache_purge_max_keys 16;
            cache_purge_worker_events_zone milestone2_bus;
            cache_purge_worker_events_channel milestone2;
        }

        location /health {
            health_status;
        }
    }
}

# The benchmark runner generates an equivalent config with ephemeral ports.

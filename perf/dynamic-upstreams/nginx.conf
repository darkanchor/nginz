daemon off;
error_log logs/error.log notice;
pid logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    upstream api_backend {
        server 127.0.0.1:19002;
    }

    server {
        listen 8888;

        # Scaffold endpoint — returns 501 placeholder JSON
        location /bench/dynamic-upstreams {
            dynamic_upstreams_api;
            dynamic_upstreams_target api_backend;
            dynamic_upstreams_source consul;
            dynamic_upstreams_refresh 5000;
        }

        # Healthy neighboring route
        location / {
            echozn "ok";
        }
    }
}

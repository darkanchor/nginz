daemon off;
error_log logs/error.log notice;
pid logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log logs/access.log;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    server {
        listen 8888;

        # Scaffold endpoint — returns 501 placeholder JSON
        location /bench/cache-purge {
            cache_purge_api;
            cache_purge_zone default;
            cache_purge_match prefix;
            cache_purge_authorize allowlist;
            cache_purge_max_keys 256;
        }

        # Healthy neighboring route
        location / {
            echozn "ok";
        }
    }
}
